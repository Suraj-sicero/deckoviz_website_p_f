<!DOCTYPE html>
<html>
<head>
  <title>Inspect Frames</title>
  <style>
    body { font-family: sans-serif; background: #333; color: white; padding: 20px; }
    .frame-container { display: flex; flex-wrap: wrap; gap: 20px; }
    .frame-card { background: #444; border: 2px solid #555; padding: 15px; border-radius: 10px; width: 45%; }
    img { max-width: 100%; border: 1px solid #777; background: #222; }
    h3 { margin-top: 0; }
  </style>
</head>
<body>
  <h1>Decoviz Predefined Frames</h1>
  <div class="frame-container">
    <div class="frame-card">
      <h3>Frame 1 (frame1.png)</h3>
      <img src="/frames/frame1.png" alt="Frame 1" />
    </div>
    <div class="frame-card">
      <h3>Frame 2 (frame2.png)</h3>
      <img src="/frames/frame2.png" alt="Frame 2" />
    </div>
    <div class="frame-card">
      <h3>Frame 3 (frame3.png)</h3>
      <img src="/frames/frame3.png" alt="Frame 3" />
    </div>
    <div class="frame-card">
      <h3>Frame 4 (frame4.png)</h3>
      <img src="/frames/frame4.png" alt="Frame 4" />
    </div>
  </div>
</body>
</html>
